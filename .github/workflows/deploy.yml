name: 前端自动部署到阿里云服务器

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: 构建并部署
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: 'pnpm'  # 开启 pnpm 缓存

      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10  # 根据你的 pnpm 版本调整，或者写 latest

      - name: 安装依赖
        run: pnpm install

      - name: 编译项目
        run: pnpm run build

      - name: 部署到阿里云服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/jinghong_backstage/dist/"
          strip_components: 1

      - name: 验证部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ls -la /var/www/jinghong_backstage/dist/
            echo "✅ 部署完成！"